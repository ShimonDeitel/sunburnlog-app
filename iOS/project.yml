name: Sunburn Log
options:
  bundleIdPrefix: com.shimondeitel.sunburnlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Sunburn Log:
    type: application
    platform: iOS
    sources:
      - path: Sunburn Log
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.sunburnlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Sunburn Log/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  Sunburn LogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Sunburn LogTests
      - path: Sunburn Log.storekit
    dependencies:
      - target: Sunburn Log
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.sunburnlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  Sunburn LogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Sunburn LogUITests
    dependencies:
      - target: Sunburn Log
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.sunburnlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Sunburn Log:
    build:
      targets:
        Sunburn Log: all
        Sunburn LogTests: [test]
        Sunburn LogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Sunburn Log.storekit
    test:
      config: Debug
      storeKitConfiguration: Sunburn Log.storekit
      targets:
        - Sunburn LogTests
        - Sunburn LogUITests
    archive:
      config: Release
